name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  # CI runs explicit quality gates; do not let Changesets' git pushes invoke
  # Husky pre-push and start another pnpm verify in the release workspace.
  HUSKY: 0

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-exclusion-helper-release:
    name: Build signed Windows exclusion helper
    runs-on: windows-2025
    env:
      CAPLETS_WINDOWS_HELPER_PUBLISHER: ${{ secrets.CAPLETS_WINDOWS_HELPER_PUBLISHER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import release code-signing publisher
        shell: pwsh
        env:
          SIGNING_PFX_BASE64: ${{ secrets.CAPLETS_WINDOWS_CODE_SIGNING_PFX }}
          SIGNING_PFX_PASSWORD: ${{ secrets.CAPLETS_WINDOWS_CODE_SIGNING_PASSWORD }}
        run: |
          if (-not $env:SIGNING_PFX_BASE64 -or -not $env:SIGNING_PFX_PASSWORD -or -not $env:CAPLETS_WINDOWS_HELPER_PUBLISHER) {
            throw "Windows helper release signing configuration is incomplete."
          }
          $pfx = Join-Path $env:RUNNER_TEMP "caplets-windows-helper.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGNING_PFX_BASE64))
          $password = ConvertTo-SecureString $env:SIGNING_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if ($cert.Subject -ne $env:CAPLETS_WINDOWS_HELPER_PUBLISHER) {
            throw "Windows helper release publisher does not match the configured subject."
          }
          "CAPLETS_WINDOWS_HELPER_CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          Remove-Item -LiteralPath $pfx -Force

      - name: Build, sign, and verify release helper
        run: |
          pnpm --filter @caplets/core windows-helper:build
          pnpm --filter @caplets/core windows-helper:verify-publish

      - name: Upload signed helper
        uses: actions/upload-artifact@v6
        with:
          name: windows-exclusion-helper-release
          path: packages/core/native/windows-exclusion-helper/artifacts/*
          if-no-files-found: error

  release:
    needs: windows-exclusion-helper-release
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download signed Windows exclusion helper
        uses: actions/download-artifact@v6
        with:
          name: windows-exclusion-helper-release
          path: packages/core/native/windows-exclusion-helper/artifacts
      - name: Verify signed helper handoff
        env:
          CAPLETS_WINDOWS_HELPER_PUBLISHER: ${{ secrets.CAPLETS_WINDOWS_HELPER_PUBLISHER }}
        run: pnpm storage:windows-helper:publish-check

      - name: Verify package
        run: pnpm verify

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release:publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          CAPLETS_POSTHOG_TOKEN: ${{ secrets.CAPLETS_POSTHOG_TOKEN }}
          CAPLETS_RUNTIME_SENTRY_DSN: ${{ secrets.CAPLETS_RUNTIME_SENTRY_DSN }}
          CAPLETS_SENTRY_AUTH_TOKEN: ${{ secrets.CAPLETS_SENTRY_AUTH_TOKEN }}
          CAPLETS_SENTRY_ORG: ${{ secrets.CAPLETS_SENTRY_ORG }}
          CAPLETS_RUNTIME_SENTRY_PROJECT: ${{ secrets.CAPLETS_RUNTIME_SENTRY_PROJECT }}
          CAPLETS_SENTRY_RELEASE: caplets-runtime@${{ github.sha }}
          CAPLETS_SENTRY_ENVIRONMENT: production
          CAPLETS_REQUIRE_WINDOWS_EXCLUSION_HELPER: "1"
          CAPLETS_WINDOWS_HELPER_PUBLISHER: ${{ secrets.CAPLETS_WINDOWS_HELPER_PUBLISHER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether CLI package was published
        if: steps.changesets.outputs.published == 'true'
        id: cli-package
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          cli_published=$(node <<'NODE'
          const publishedPackages = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]');
          const cliPublished = publishedPackages.some((pkg) => pkg && pkg.name === 'caplets');
          process.stdout.write(cliPublished ? 'true' : 'false');
          NODE
          )
          echo "published=${cli_published}" >> "$GITHUB_OUTPUT"

      - name: Read Docker image version
        if: steps.changesets.outputs.published == 'true' && steps.cli-package.outputs.published == 'true'
        id: image-version
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        if: steps.changesets.outputs.published == 'true' && steps.cli-package.outputs.published == 'true'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Setup Docker Buildx
        if: steps.changesets.outputs.published == 'true' && steps.cli-package.outputs.published == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GitHub Container Registry
        if: steps.changesets.outputs.published == 'true' && steps.cli-package.outputs.published == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        if: steps.changesets.outputs.published == 'true' && steps.cli-package.outputs.published == 'true'
        id: docker-meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ghcr.io/spiritledsoftware/caplets
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.image-version.outputs.version }}
            type=raw,value=v${{ steps.image-version.outputs.version }}
            type=sha,format=short,prefix=sha-

      - name: Publish Docker image
        if: steps.changesets.outputs.published == 'true' && steps.cli-package.outputs.published == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          build-args: |
            CAPLETS_POSTHOG_TOKEN=${{ secrets.CAPLETS_POSTHOG_TOKEN }}
            CAPLETS_RUNTIME_SENTRY_DSN=${{ secrets.CAPLETS_RUNTIME_SENTRY_DSN }}
            CAPLETS_SENTRY_RELEASE=caplets-runtime@${{ github.sha }}
            CAPLETS_SENTRY_ENVIRONMENT=production

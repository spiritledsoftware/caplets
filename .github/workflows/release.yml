name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  # CI runs explicit quality gates; do not let Changesets' git pushes invoke
  # Husky pre-push and start another pnpm verify in the release workspace.
  HUSKY: 0

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package
        run: pnpm verify

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release:publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          CAPLETS_POSTHOG_TOKEN: ${{ secrets.CAPLETS_POSTHOG_TOKEN }}
          CAPLETS_RUNTIME_SENTRY_DSN: ${{ secrets.CAPLETS_RUNTIME_SENTRY_DSN }}
          CAPLETS_SENTRY_AUTH_TOKEN: ${{ secrets.CAPLETS_SENTRY_AUTH_TOKEN }}
          CAPLETS_SENTRY_ORG: ${{ secrets.CAPLETS_SENTRY_ORG }}
          CAPLETS_RUNTIME_SENTRY_PROJECT: ${{ secrets.CAPLETS_RUNTIME_SENTRY_PROJECT }}
          CAPLETS_SENTRY_RELEASE: caplets-runtime@${{ github.sha }}
          CAPLETS_SENTRY_ENVIRONMENT: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect CLI release for this commit
        id: cli-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          tag="caplets@${version}"
          git fetch --force --tags origin
          tag_commit=$(git rev-list -n 1 "$tag" 2>/dev/null || true)
          published=false
          if [ "$tag_commit" = "$GITHUB_SHA" ]; then
            gh release view "$tag" >/dev/null
            published=true
          fi
          echo "published=${published}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        if: steps.cli-release.outputs.published == 'true'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Setup Docker Buildx
        if: steps.cli-release.outputs.published == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GitHub Container Registry
        if: steps.cli-release.outputs.published == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        if: steps.cli-release.outputs.published == 'true'
        id: docker-meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ghcr.io/spiritledsoftware/caplets
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.cli-release.outputs.version }}
            type=raw,value=v${{ steps.cli-release.outputs.version }}
            type=sha,format=short,prefix=sha-

      - name: Publish Docker image
        if: steps.cli-release.outputs.published == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          build-args: |
            CAPLETS_POSTHOG_TOKEN=${{ secrets.CAPLETS_POSTHOG_TOKEN }}
            CAPLETS_RUNTIME_SENTRY_DSN=${{ secrets.CAPLETS_RUNTIME_SENTRY_DSN }}
            CAPLETS_SENTRY_RELEASE=caplets-runtime@${{ github.sha }}
            CAPLETS_SENTRY_ENVIRONMENT=production

      - name: Publish Docker Compose release assets
        if: steps.cli-release.outputs.published == 'true'
        run: >-
          gh release upload "caplets@${{ steps.cli-release.outputs.version }}"
          docker-compose.yml
          docker-compose.postgres.yml
          docker-compose.postgres-hardened.yml
          --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

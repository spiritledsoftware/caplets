name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  # CI runs explicit quality gates; do not let Changesets' git pushes invoke
  # Husky pre-push and start another pnpm verify in the release workspace.
  HUSKY: 0

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package
        run: pnpm verify

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether CLI package was published
        if: steps.changesets.outputs.published == 'true'
        id: cli-package
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          cli_published=$(node <<'NODE'
          const publishedPackages = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]');
          const cliPublished = publishedPackages.some((pkg) => pkg && pkg.name === 'caplets');
          process.stdout.write(cliPublished ? 'true' : 'false');
          NODE
          )
          echo "published=${cli_published}" >> "$GITHUB_OUTPUT"

      - name: Read Docker image version
        if: steps.changesets.outputs.published == 'true' && steps.cli-package.outputs.published == 'true'
        id: image-version
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        if: steps.changesets.outputs.published == 'true' && steps.cli-package.outputs.published == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GitHub Container Registry
        if: steps.changesets.outputs.published == 'true' && steps.cli-package.outputs.published == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        if: steps.changesets.outputs.published == 'true' && steps.cli-package.outputs.published == 'true'
        id: docker-meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ghcr.io/spiritledsoftware/caplets
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.image-version.outputs.version }}
            type=raw,value=v${{ steps.image-version.outputs.version }}
            type=sha,format=short,prefix=sha-

      - name: Publish Docker image
        if: steps.changesets.outputs.published == 'true' && steps.cli-package.outputs.published == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}

name: Dev Snapshot Release

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: dev-snapshot-${{ github.ref }}
  cancel-in-progress: false

env:
  HUSKY: 0

jobs:
  plan:
    name: Derive dev snapshot manifest
    runs-on: ubuntu-latest
    outputs:
      has_public_releases: ${{ steps.manifest.outputs.has_public_releases }}
      validation_kind: ${{ steps.manifest.outputs.validation_kind }}
      staging_tag: ${{ steps.manifest.outputs.staging_tag }}
      recovery_action: ${{ steps.manifest.outputs.recovery_action }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository gate
        run: pnpm verify

      - name: Capture Changesets release plan
        run: |
          mkdir -p .tmp
          pnpm changeset status --output .tmp/changeset-status.json
          node scripts/dev-snapshot-release.mjs status \
            --status-file .tmp/changeset-status.json \
            --source-commit "$GITHUB_SHA" \
            --run-identity "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --output .tmp/dev-snapshot-manifest.json

      - name: Recover stable public snapshot state
        run: |
          node --input-type=module <<'NODE'
          import {
            classifyRegistrySnapshot,
            createStagingTag,
            fetchPublicPackument,
            readJson,
            recoverSnapshotManifest,
            writeJson,
          } from './scripts/dev-snapshot-release.mjs';
          const manifestPath = '.tmp/dev-snapshot-manifest.json';
          const manifest = readJson(manifestPath);
          const expectedStagingTag = createStagingTag(manifest.fingerprint, `${process.env.GITHUB_RUN_ID}-${process.env.GITHUB_RUN_ATTEMPT}`);
          if (manifest.stagingTag !== expectedStagingTag) {
            throw new Error(`Snapshot manifest staging tag ${manifest.stagingTag} does not match this run.`);
          }
          const recovery = await recoverSnapshotManifest(manifest);
          const packuments = Object.fromEntries(
            await Promise.all(
              recovery.manifest.releases.map(async (release) => [
                release.name,
                await fetchPublicPackument(release.name),
              ]),
            ),
          );
          const result = classifyRegistrySnapshot(recovery.manifest, packuments);
          if (result.action !== recovery.action) {
            throw new Error(
              `Registry snapshot state changed during final observation: ${recovery.action} to ${result.action}.`,
            );
          }
          writeJson(manifestPath, { ...result.manifest, recoveryAction: result.action });
          NODE
      - name: Derive workflow outputs
        id: manifest
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync } from 'node:fs';
          import { readJson } from './scripts/dev-snapshot-release.mjs';
          const manifest = readJson('.tmp/dev-snapshot-manifest.json');
          appendFileSync(process.env.GITHUB_OUTPUT, `has_public_releases=${manifest.hasPublicReleases}\n`);
          appendFileSync(process.env.GITHUB_OUTPUT, `validation_kind=${manifest.validation.kind}\n`);
          appendFileSync(process.env.GITHUB_OUTPUT, `staging_tag=${manifest.stagingTag}\n`);
          appendFileSync(process.env.GITHUB_OUTPUT, `recovery_action=${manifest.recoveryAction}\n`);
          NODE

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-snapshot-manifest
          path: .tmp/dev-snapshot-manifest.json

  publish:
    name: Publish staged snapshots
    needs: plan
    if: github.ref == 'refs/heads/main' && needs.plan.outputs.has_public_releases == 'true' && needs.plan.outputs.recovery_action == 'fresh'
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    env:
      STAGING_TAG: ${{ needs.plan.outputs.staging_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-snapshot-manifest
          path: .tmp

      - name: Patch snapshot config
        run: node scripts/dev-snapshot-release.mjs patch-snapshot-config

      - name: Apply snapshot versions
        run: pnpm changeset version --snapshot dev

      - name: Refresh manifest to snapshot versions
        run: |
          node scripts/dev-snapshot-release.mjs refresh-manifest \
            --manifest .tmp/dev-snapshot-manifest.json \
            --output .tmp/dev-snapshot-manifest.json

      - name: Rewrite public closure
        run: node scripts/dev-snapshot-release.mjs rewrite-closure --manifest .tmp/dev-snapshot-manifest.json

      - name: Stamp snapshot registry identity
        run: |
          node --input-type=module <<'NODE'
          import { readJson, stampSnapshotMetadata } from './scripts/dev-snapshot-release.mjs';
          stampSnapshotMetadata(readJson('.tmp/dev-snapshot-manifest.json'));
          NODE

      - name: Build disposable snapshot workspace artifacts
        run: pnpm build

      - name: Require current main commit before publishing
        run: |
          git fetch --no-tags origin main
          current_main="$(git rev-parse origin/main)"
          test "$GITHUB_SHA" = "$current_main" || {
            echo "Refusing to publish stale main commit $GITHUB_SHA; current main is $current_main." >&2
            exit 1
          }

      - name: Publish exact snapshots with run-scoped staging tag
        run: pnpm changeset publish --tag "$STAGING_TAG" --no-git-tag

      - name: Verify published snapshot registry identity
        run: |
          node --input-type=module <<'NODE'
          import {
            classifyRegistrySnapshot,
            fetchPublicPackument,
            readJson,
            recoverSnapshotManifest,
            writeJson,
          } from './scripts/dev-snapshot-release.mjs';
          const manifestPath = '.tmp/dev-snapshot-manifest.json';
          const recovery = await recoverSnapshotManifest(readJson(manifestPath), {
            requiredAction: 'reuse-staged',
          });
          const packuments = Object.fromEntries(
            await Promise.all(
              recovery.manifest.releases.map(async (release) => [
                release.name,
                await fetchPublicPackument(release.name),
              ]),
            ),
          );
          const result = classifyRegistrySnapshot(recovery.manifest, packuments);
          if (result.action !== 'reuse-staged') {
            throw new Error(`Published snapshot registry identity is ${result.action}, expected reuse-staged.`);
          }
          writeJson(manifestPath, result.manifest);
          NODE

      - name: Upload refreshed snapshot manifest
        uses: actions/upload-artifact@v4
        with:
          name: dev-snapshot-manifest
          path: .tmp/dev-snapshot-manifest.json
          overwrite: true

  validate_cli:
    name: Validate CLI or core snapshot line
    needs: [plan, publish]
    if: always() && github.ref == 'refs/heads/main' && needs.plan.outputs.has_public_releases == 'true' && needs.plan.outputs.validation_kind == 'cli-bootstrap' && ((needs.plan.outputs.recovery_action == 'fresh' && needs.publish.result == 'success') || (needs.plan.outputs.recovery_action == 'reuse-staged' && needs.publish.result == 'skipped'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-snapshot-manifest
          path: .tmp

      - name: Create isolated install root
        id: install-root
        run: |
          install_root="$(mktemp -d -t caplets-dev-install-XXXXXX)"
          echo "install_root=${install_root}" >> "$GITHUB_OUTPUT"

      - name: Install and smoke exact CLI snapshot
        env:
          INSTALL_ROOT: ${{ steps.install-root.outputs.install_root }}
        run: |
          export HOME="$INSTALL_ROOT/home"
          export USERPROFILE="$HOME"
          export npm_config_prefix="$INSTALL_ROOT"
          export npm_config_cache="$INSTALL_ROOT/cache"
          export XDG_CONFIG_HOME="$INSTALL_ROOT/xdg-config"
          export XDG_STATE_HOME="$INSTALL_ROOT/xdg-state"
          export CAPLETS_CONFIG="$INSTALL_ROOT/caplets-config.json"
          export NO_COLOR=1
          export PATH="$INSTALL_ROOT/bin:$PATH"
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { readJson } from './scripts/dev-snapshot-release.mjs';
          import { buildValidationCommands } from './scripts/check-dev-snapshot-bootstrap.mjs';
          const manifest = readJson('.tmp/dev-snapshot-manifest.json');
          const sleep = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds));
          for (const command of buildValidationCommands(manifest, { installRoot: process.env.INSTALL_ROOT })) {
            const [binary, ...args] = command.split(' ');
            const attempts = binary === 'npm' && args[0] === 'install' ? 12 : 1;
            for (let attempt = 1; attempt <= attempts; attempt += 1) {
              try {
                execFileSync(binary, args, { stdio: 'inherit', env: process.env });
                break;
              } catch (error) {
                if (attempt === attempts) throw error;
                await sleep(5_000);
              }
            }
          }
          NODE
          node scripts/check-dev-snapshot-bootstrap.mjs assert-installed --manifest .tmp/dev-snapshot-manifest.json --install-root "$INSTALL_ROOT"

  validate_packages:
    name: Validate package-only snapshot line
    needs: [plan, publish]
    if: always() && github.ref == 'refs/heads/main' && needs.plan.outputs.has_public_releases == 'true' && needs.plan.outputs.validation_kind == 'package-only' && ((needs.plan.outputs.recovery_action == 'fresh' && needs.publish.result == 'success') || (needs.plan.outputs.recovery_action == 'reuse-staged' && needs.publish.result == 'skipped'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-snapshot-manifest
          path: .tmp

      - name: Create isolated install root
        id: install-root
        run: |
          install_root="$(mktemp -d -t caplets-dev-install-XXXXXX)"
          echo "install_root=${install_root}" >> "$GITHUB_OUTPUT"

      - name: Install package-only snapshot line
        env:
          INSTALL_ROOT: ${{ steps.install-root.outputs.install_root }}
        run: |
          export HOME="$INSTALL_ROOT/home"
          export USERPROFILE="$HOME"
          export npm_config_prefix="$INSTALL_ROOT"
          export npm_config_cache="$INSTALL_ROOT/cache"
          export XDG_CONFIG_HOME="$INSTALL_ROOT/xdg-config"
          export XDG_STATE_HOME="$INSTALL_ROOT/xdg-state"
          export CAPLETS_CONFIG="$INSTALL_ROOT/caplets-config.json"
          export NO_COLOR=1
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { readJson } from './scripts/dev-snapshot-release.mjs';
          import { buildValidationCommands } from './scripts/check-dev-snapshot-bootstrap.mjs';
          const manifest = readJson('.tmp/dev-snapshot-manifest.json');
          const sleep = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds));
          for (const command of buildValidationCommands(manifest, { installRoot: process.env.INSTALL_ROOT })) {
            const [binary, ...args] = command.split(' ');
            const attempts = binary === 'npm' && args[0] === 'install' ? 12 : 1;
            for (let attempt = 1; attempt <= attempts; attempt += 1) {
              try {
                execFileSync(binary, args, { stdio: 'inherit', env: process.env });
                break;
              } catch (error) {
                if (attempt === attempts) throw error;
                await sleep(5_000);
              }
            }
          }
          NODE
          node scripts/check-dev-snapshot-bootstrap.mjs assert-installed --manifest .tmp/dev-snapshot-manifest.json --install-root "$INSTALL_ROOT"

  validation_complete:
    name: Validation barrier
    needs: [plan, publish, validate_cli, validate_packages]
    if: always() && github.ref == 'refs/heads/main' && needs.plan.outputs.has_public_releases == 'true' && ((needs.plan.outputs.recovery_action == 'fresh' && needs.publish.result == 'success') || (needs.plan.outputs.recovery_action == 'reuse-staged' && needs.publish.result == 'skipped'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require one validation lane to succeed
        run: |
          cli_result='${{ needs.validate_cli.result }}'
          package_result='${{ needs.validate_packages.result }}'
          case "${cli_result}:${package_result}" in
            success:skipped|skipped:success)
              ;;
            *)
              echo "Unexpected validation results: cli=${cli_result} package=${package_result}" >&2
              exit 1
              ;;
          esac

  promote:
    name: Promote validated snapshots to dev
    needs: [plan, publish, validation_complete]
    if: always() && github.ref == 'refs/heads/main' && needs.plan.outputs.has_public_releases == 'true' && needs.plan.result == 'success' && needs.validation_complete.result == 'success' && ((needs.plan.outputs.recovery_action == 'fresh' && needs.publish.result == 'success') || (needs.plan.outputs.recovery_action == 'reuse-staged' && needs.publish.result == 'skipped'))
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: read
    steps:
      - name: Stop if the run was not triggered from main
        run: |
          test "${GITHUB_REF}" = "refs/heads/main" || {
            echo "Dev tag promotion is main-only." >&2
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-snapshot-manifest
          path: .tmp

      - name: Require current main commit before promotion
        run: |
          git fetch --no-tags origin main
          current_main="$(git rev-parse origin/main)"
          test "$GITHUB_SHA" = "$current_main" || {
            echo "Refusing to promote stale main commit $GITHUB_SHA; current main is $current_main." >&2
            exit 1
          }

      - name: Capture pre-run dist-tags
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { writeFileSync } from 'node:fs';
          import { readJson } from './scripts/dev-snapshot-release.mjs';
          const manifest = readJson('.tmp/dev-snapshot-manifest.json');
          const currentTags = {};
          for (const release of manifest.releases) {
            const raw = execFileSync('npm', ['view', release.name, 'dist-tags', '--json'], {
              encoding: 'utf8',
              env: process.env,
            });
            currentTags[release.name] = JSON.parse(raw);
          }
          writeFileSync('.tmp/pre-run-tags.json', `${JSON.stringify(currentTags, null, 2)}\n`);
          NODE

      - name: Upload pre-run tag snapshot
        uses: actions/upload-artifact@v4
        with:
          name: dev-snapshot-pre-run-tags
          path: .tmp/pre-run-tags.json

      - name: Mark promotion transaction started
        id: promotion_transaction_started
        run: echo "started=true" >> "$GITHUB_OUTPUT"

      - name: Promote validated versions to dev with reconciliation
        id: promote_dev_tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_DIST_TAG_TOKEN }}
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { readFileSync } from 'node:fs';
          import { readJson } from './scripts/dev-snapshot-release.mjs';
          const manifest = readJson('.tmp/dev-snapshot-manifest.json');
          const preRunTags = JSON.parse(readFileSync('.tmp/pre-run-tags.json', 'utf8'));
          const sleep = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds));
          const readTags = (packageName) => JSON.parse(
            execFileSync('npm', ['view', packageName, 'dist-tags', '--json'], {
              encoding: 'utf8',
              env: process.env,
            }),
          );
          async function waitForTags(packageName, predicate, description) {
            const deadline = Date.now() + 120_000;
            let tags;
            do {
              tags = readTags(packageName);
              if (predicate(tags)) return tags;
              await sleep(5_000);
            } while (Date.now() < deadline);
            throw new Error(`${packageName} did not ${description}; last tags: ${JSON.stringify(tags)}`);
          }
          const attempted = [];
          try {
            for (const release of manifest.releases) {
              attempted.push(release);
              execFileSync('npm', ['dist-tag', 'add', `${release.name}@${release.newVersion}`, 'dev'], {
                stdio: 'inherit',
                env: process.env,
              });
              const tags = await waitForTags(
                release.name,
                (candidate) => candidate.dev === release.newVersion,
                `publish dev=${release.newVersion}`,
              );
              if ((preRunTags[release.name]?.latest ?? null) !== (tags.latest ?? null)) {
                throw new Error(`${release.name} latest changed unexpectedly during dev promotion.`);
              }
            }
          } catch (error) {
            const rollbackFailures = [];
            for (const release of attempted.reverse()) {
              try {
                await waitForTags(
                  release.name,
                  (candidate) => candidate.dev === release.newVersion,
                  `expose attempted dev=${release.newVersion}`,
                );
                const previousDev = preRunTags[release.name]?.dev;
                if (typeof previousDev === 'string' && previousDev.length > 0) {
                  execFileSync('npm', ['dist-tag', 'add', `${release.name}@${previousDev}`, 'dev'], {
                    stdio: 'inherit',
                    env: process.env,
                  });
                  await waitForTags(
                    release.name,
                    (candidate) => candidate.dev === previousDev,
                    `restore dev=${previousDev}`,
                  );
                } else {
                  execFileSync('npm', ['dist-tag', 'rm', release.name, 'dev'], {
                    stdio: 'inherit',
                    env: process.env,
                  });
                  await waitForTags(
                    release.name,
                    (candidate) => candidate.dev === undefined,
                    'remove dev tag',
                  );
                }
              } catch (rollbackError) {
                rollbackFailures.push(rollbackError);
              }
            }
            if (rollbackFailures.length > 0) {
              throw new AggregateError([error, ...rollbackFailures], 'Dev promotion and reconciliation failed.');
            }
            throw error;
          }
          NODE

      - name: Create install root for promoted smoke
        if: needs.plan.outputs.validation_kind == 'cli-bootstrap'
        id: install-root
        run: |
          install_root="$(mktemp -d -t caplets-dev-promoted-XXXXXX)"
          echo "install_root=${install_root}" >> "$GITHUB_OUTPUT"

      - name: Smoke promoted caplets@dev line
        if: needs.plan.outputs.validation_kind == 'cli-bootstrap'
        id: smoke_promoted_cli
        env:
          INSTALL_ROOT: ${{ steps.install-root.outputs.install_root }}
        run: |
          export HOME="$INSTALL_ROOT/home"
          export USERPROFILE="$HOME"
          export npm_config_prefix="$INSTALL_ROOT"
          export npm_config_cache="$INSTALL_ROOT/cache"
          export XDG_CONFIG_HOME="$INSTALL_ROOT/xdg-config"
          export XDG_STATE_HOME="$INSTALL_ROOT/xdg-state"
          export CAPLETS_CONFIG="$INSTALL_ROOT/caplets-config.json"
          export NO_COLOR=1
          export PATH="$INSTALL_ROOT/bin:$PATH"
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { readJson, CORE_PACKAGE_NAME } from './scripts/dev-snapshot-release.mjs';
          const manifest = readJson('.tmp/dev-snapshot-manifest.json');
          const sleep = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds));
          const readTags = (packageName) => JSON.parse(
            execFileSync('npm', ['view', packageName, 'dist-tags', '--json'], {
              encoding: 'utf8',
              env: process.env,
            }),
          );
          for (const release of manifest.releases) {
            const deadline = Date.now() + 120_000;
            let tags;
            do {
              tags = readTags(release.name);
              if (tags.dev === release.newVersion) break;
              await sleep(5_000);
            } while (Date.now() < deadline);
            if (tags.dev !== release.newVersion) {
              throw new Error(`${release.name} dev resolved to ${tags.dev}, expected ${release.newVersion}.`);
            }
            if (release.name !== CORE_PACKAGE_NAME) {
              for (let attempt = 1; attempt <= 12; attempt += 1) {
                try {
                  execFileSync('npm', ['install', '-g', `${release.name}@dev`], {
                    stdio: 'inherit',
                    env: process.env,
                  });
                  break;
                } catch (error) {
                  if (attempt === 12) throw error;
                  await sleep(5_000);
                }
              }
            }
          }
          NODE
          caplets --version
          caplets setup mcp-client --output "$INSTALL_ROOT/caplets.mcp.json" --format json
          node scripts/check-dev-snapshot-bootstrap.mjs assert-installed --manifest .tmp/dev-snapshot-manifest.json --install-root "$INSTALL_ROOT"

      - name: Restore dev tags after promoted smoke failure
        if: ${{ always() && steps.promotion_transaction_started.outputs.started == 'true' && (steps.promote_dev_tags.outcome != 'success' || (needs.plan.outputs.validation_kind == 'cli-bootstrap' && steps.smoke_promoted_cli.outcome != 'success')) }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_DIST_TAG_TOKEN }}
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { readFileSync } from 'node:fs';
          import { readJson } from './scripts/dev-snapshot-release.mjs';
          const manifest = readJson('.tmp/dev-snapshot-manifest.json');
          const preRunTags = JSON.parse(readFileSync('.tmp/pre-run-tags.json', 'utf8'));
          const sleep = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds));
          const readTags = (packageName) => JSON.parse(
            execFileSync('npm', ['view', packageName, 'dist-tags', '--json'], {
              encoding: 'utf8',
              env: process.env,
            }),
          );
          async function waitForTags(packageName, predicate, description) {
            const deadline = Date.now() + 120_000;
            let tags;
            do {
              tags = readTags(packageName);
              if (predicate(tags)) return;
              await sleep(5_000);
            } while (Date.now() < deadline);
            throw new Error(`${packageName} did not ${description}; last tags: ${JSON.stringify(tags)}`);
          }
          const failures = [];
          for (const release of [...manifest.releases].reverse()) {
            try {
              const previousDev = preRunTags[release.name]?.dev;
              if (typeof previousDev === 'string' && previousDev.length > 0) {
                execFileSync('npm', ['dist-tag', 'add', `${release.name}@${previousDev}`, 'dev'], {
                  stdio: 'inherit',
                  env: process.env,
                });
                await waitForTags(
                  release.name,
                  (candidate) => candidate.dev === previousDev,
                  `restore dev=${previousDev}`,
                );
              } else {
                try {
                  execFileSync('npm', ['dist-tag', 'rm', release.name, 'dev'], {
                    stdio: 'inherit',
                    env: process.env,
                  });
                } catch (error) {
                  if (readTags(release.name).dev !== undefined) throw error;
                }
                await waitForTags(
                  release.name,
                  (candidate) => candidate.dev === undefined,
                  'remove dev tag',
                );
              }
            } catch (error) {
              failures.push(error);
            }
          }
          if (failures.length > 0) {
            throw new AggregateError(failures, 'Failed to reconcile all promoted dev tags.');
          }
          NODE

  dev_image:
    name: Publish best-effort dev image
    needs: [plan, promote]
    if: github.ref == 'refs/heads/main' && needs.plan.outputs.has_public_releases == 'true' && needs.plan.outputs.validation_kind == 'cli-bootstrap' && needs.promote.result == 'success' && (needs.plan.outputs.recovery_action == 'fresh' || needs.plan.outputs.recovery_action == 'reuse-staged')
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish dev image tags
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          "push": true
          tags: |
            ghcr.io/spiritledsoftware/caplets:dev
            ghcr.io/spiritledsoftware/caplets:dev-${{ github.sha }}
          build-args: |
            CAPLETS_SENTRY_RELEASE=caplets-runtime@dev-${{ github.sha }}
            CAPLETS_SENTRY_ENVIRONMENT=development

name: PR Preview

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check apps/ changes
        id: apps-changes
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            current_tag="${{ github.event.release.tag_name }}"
            previous_tag="$(git describe --tags --abbrev=0 "${current_tag}^" 2>/dev/null || true)"

            if [[ -n "$previous_tag" ]]; then
              changed_files="$(git diff --name-only "$previous_tag" "$current_tag")"
            else
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$current_tag")"
            fi
          else
            changed_files="$(git diff-tree --no-commit-id --name-only -r HEAD)"
          fi

          if grep -q '^apps/' <<< "$changed_files"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.apps-changes.outputs.changed == 'true'
        uses: pnpm/action-setup@v6

      - name: Setup Node
        if: steps.apps-changes.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: steps.apps-changes.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run quality gates
        if: steps.apps-changes.outputs.changed == 'true'
        run: pnpm run alchemy:deploy
        env:
          ALCHEMY_STAGE: prod
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}

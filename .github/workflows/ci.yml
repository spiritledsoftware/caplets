name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gates
        run: pnpm verify

  storage-stack:
    name: Storage stack (Node ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.23.1, 24.18.0]
    services:
      postgres:
        image: postgres:16.9-bookworm
        env:
          POSTGRES_DB: caplets
          POSTGRES_USER: caplets
          POSTGRES_PASSWORD: caplets-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U caplets -d caplets"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check paired migration artifacts
        run: pnpm storage:schema:check

      - name: Run paired control-plane schema and role gates
        run: |
          pnpm --filter @caplets/core exec vitest run test/control-plane-schema.test.ts
          pnpm --filter @caplets/core exec vitest run test/control-plane-dialects.test.ts
          pnpm --filter @caplets/core exec vitest run test/control-plane-migrations.test.ts
        env:
          CAPLETS_TEST_POSTGRES_URL: postgres://caplets:caplets-test@127.0.0.1:5432/caplets

      - name: Run real Postgres behavioral contracts sequentially
        run: |
          pnpm --filter @caplets/core exec vitest run test/control-plane-caplets.test.ts
          pnpm --filter @caplets/core exec vitest run test/control-plane-migration-persistence.test.ts
          pnpm --filter @caplets/core exec vitest run test/control-plane-security-state.test.ts
          pnpm --filter @caplets/core exec vitest run test/control-plane-transfer.test.ts
          pnpm --filter @caplets/core exec vitest run test/postgres-convergence.test.ts
        env:
          CAPLETS_TEST_POSTGRES_URL: postgres://caplets:caplets-test@127.0.0.1:5432/caplets

      - name: Start S3-compatible fixture
        run: >-
          docker run --detach --rm --name caplets-minio
          --publish 9000:9000
          --env MINIO_ROOT_USER=caplets-test
          --env MINIO_ROOT_PASSWORD=caplets-test-secret
          quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
          server /data --address :9000

      - name: Wait for S3-compatible fixture
        run: |
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:9000/minio/health/live && exit 0
            sleep 1
          done
          exit 1
      - name: Run production S3 verifier contract
        run: >-
          pnpm --filter @caplets/core exec vitest run
          test/storage-production-adapters.test.ts
        env:
          CAPLETS_TEST_S3_ENDPOINT: http://127.0.0.1:9000
          CAPLETS_TEST_S3_BUCKET: caplets-production-verifier
          CAPLETS_TEST_S3_PREFIX: control-plane
          CAPLETS_TEST_S3_ACCESS_KEY_ID: caplets-test
          CAPLETS_TEST_S3_SECRET_ACCESS_KEY: caplets-test-secret
          CAPLETS_TEST_S3_CREATE_BUCKET: "1"

      - name: Run storage stack exit gate
        run: pnpm storage:stack:check
        env:
          CAPLETS_REQUIRE_STORAGE_EXTERNAL: "1"
          CAPLETS_STORAGE_RESULT_DIR: storage-results
          CAPLETS_TEST_POSTGRES_URL: postgres://caplets:caplets-test@127.0.0.1:5432/caplets
          CAPLETS_TEST_S3_ENDPOINT: http://127.0.0.1:9000
          CAPLETS_TEST_S3_BUCKET: caplets-stack
          CAPLETS_TEST_S3_PREFIX: control-plane
          CAPLETS_TEST_S3_ACCESS_KEY_ID: caplets-test
          CAPLETS_TEST_S3_SECRET_ACCESS_KEY: caplets-test-secret
          CAPLETS_TEST_S3_CREATE_BUCKET: "1"

      - name: Upload storage stack result
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: storage-stack-node-${{ matrix.node-version }}
          path: storage-results/*.json
          if-no-files-found: error

  storage-full-envelope-benchmark:
    name: Storage full-envelope Postgres benchmark
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    services:
      postgres:
        image: postgres:16.9-bookworm
        env:
          POSTGRES_DB: caplets
          POSTGRES_USER: caplets
          POSTGRES_PASSWORD: caplets-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U caplets -d caplets"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run SQLite runtime materialization benchmarks
        run: >-
          pnpm --filter @caplets/core exec vitest run
          test/control-plane-runtime.test.ts
          -t "materializes a maximum-size SQL asset|composes the exact 2,000-Caplet U2 count"
        env:
          CAPLETS_BENCHMARK_REPORT: "1"
          NODE_OPTIONS: --max-old-space-size=12288

      - name: Run full-envelope real Postgres qualification
        run: >-
          pnpm --filter @caplets/core exec vitest run
          test/control-plane-caplets.test.ts
          -t "qualifies generation-indexed snapshot materialization at the full Postgres envelope"
        env:
          CAPLETS_TEST_POSTGRES_URL: postgres://caplets:caplets-test@127.0.0.1:5432/caplets
          CAPLETS_FULL_ENVELOPE_BENCHMARK: "1"
          CAPLETS_BENCHMARK_REPORT: "1"
          NODE_OPTIONS: --max-old-space-size=12288

  storage-exclusion-linux:
    name: Storage exclusion (Linux)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install published prior Caplets fixture
        run: pnpm add --global caplets@0.25.10

      - name: Run Linux exclusion and offline one-shot gate
        run: pnpm storage:platform:check
        env:
          CAPLETS_STORAGE_PLATFORM_EXPECT: linux
          CAPLETS_STORAGE_RESULT_DIR: storage-results
          CAPLETS_PRIOR_CAPLETS_BIN: caplets
          CAPLETS_REQUIRE_PRIOR_PACKAGE: "1"

      - name: Upload Linux exclusion evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: storage-exclusion-linux
          path: storage-results/*.json
          if-no-files-found: error

  storage-exclusion-macos:
    name: Storage exclusion (macOS)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install published prior Caplets fixture
        run: pnpm add --global caplets@0.25.10

      - name: Run macOS lsof exclusion gate
        run: pnpm storage:platform:check
        env:
          CAPLETS_STORAGE_PLATFORM_EXPECT: darwin
          CAPLETS_STORAGE_RESULT_DIR: storage-results
          CAPLETS_PRIOR_CAPLETS_BIN: caplets
          CAPLETS_REQUIRE_PRIOR_PACKAGE: "1"

      - name: Upload macOS exclusion evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: storage-exclusion-macos
          path: storage-results/*.json
          if-no-files-found: error

  storage-exclusion-windows:
    name: Storage exclusion (Windows x64)
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install published prior Caplets fixture
        run: pnpm add --global caplets@0.25.10

      - name: Generate test code-signing publisher
        shell: pwsh
        timeout-minutes: 2
        run: |
          $subject = "CN=Caplets Exclusion Test Publisher"
          $rsa = [Security.Cryptography.RSA]::Create(2048)
          $request = [Security.Cryptography.X509Certificates.CertificateRequest]::new(
            $subject,
            $rsa,
            [Security.Cryptography.HashAlgorithmName]::SHA256,
            [Security.Cryptography.RSASignaturePadding]::Pkcs1
          )
          $usages = [Security.Cryptography.OidCollection]::new()
          [void]$usages.Add([Security.Cryptography.Oid]::new("1.3.6.1.5.5.7.3.3"))
          $request.CertificateExtensions.Add(
            [Security.Cryptography.X509Certificates.X509EnhancedKeyUsageExtension]::new($usages, $false)
          )
          $request.CertificateExtensions.Add(
            [Security.Cryptography.X509Certificates.X509KeyUsageExtension]::new(
              [Security.Cryptography.X509Certificates.X509KeyUsageFlags]::DigitalSignature,
              $true
            )
          )
          $cert = $request.CreateSelfSigned(
            [DateTimeOffset]::UtcNow.AddMinutes(-5),
            [DateTimeOffset]::UtcNow.AddDays(1)
          )
          $password = [Guid]::NewGuid().ToString("N")
          Write-Output "::add-mask::$password"
          $pfxPath = Join-Path $env:RUNNER_TEMP "caplets-exclusion-test-publisher.pfx"
          [IO.File]::WriteAllBytes(
            $pfxPath,
            $cert.Export([Security.Cryptography.X509Certificates.X509ContentType]::Pfx, $password)
          )
          $certificatePath = Join-Path $env:RUNNER_TEMP "caplets-exclusion-test-publisher.cer"
          [IO.File]::WriteAllBytes(
            $certificatePath,
            $cert.Export([Security.Cryptography.X509Certificates.X509ContentType]::Cert)
          )
          "CAPLETS_WINDOWS_HELPER_CERT_PFX=$pfxPath" >> $env:GITHUB_ENV
          "CAPLETS_WINDOWS_HELPER_CERT_CER=$certificatePath" >> $env:GITHUB_ENV
          "CAPLETS_WINDOWS_HELPER_CERT_PASSWORD=$password" >> $env:GITHUB_ENV
          "CAPLETS_WINDOWS_HELPER_CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          "CAPLETS_WINDOWS_HELPER_PUBLISHER=$($cert.Subject)" >> $env:GITHUB_ENV
          "CAPLETS_WINDOWS_HELPER_ARTIFACT_ROOT=$PWD\packages\core\native\windows-exclusion-helper\artifacts" >> $env:GITHUB_ENV
          "CAPLETS_REQUIRE_WINDOWS_EXCLUSION_HELPER=1" >> $env:GITHUB_ENV

      - name: Import test code-signing publisher
        shell: pwsh
        timeout-minutes: 2
        run: |
          $password = ConvertTo-SecureString $env:CAPLETS_WINDOWS_HELPER_CERT_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate `
            -FilePath $env:CAPLETS_WINDOWS_HELPER_CERT_PFX `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $password
          if ($cert.Thumbprint -ne $env:CAPLETS_WINDOWS_HELPER_CERT_THUMBPRINT) {
            throw "Imported Caplets exclusion test publisher thumbprint is invalid."
          }

      - name: Trust test code-signing publisher
        shell: pwsh
        timeout-minutes: 2
        run: |
          & certutil.exe -f -addstore Root $env:CAPLETS_WINDOWS_HELPER_CERT_CER
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to trust the Caplets exclusion test publisher."
          }
          Remove-Item `
            -LiteralPath $env:CAPLETS_WINDOWS_HELPER_CERT_PFX, $env:CAPLETS_WINDOWS_HELPER_CERT_CER `
            -Force

      - name: Build and sign reviewed x64 helper
        run: pnpm --filter @caplets/core windows-helper:build

      - name: Run Authenticode publish guard
        run: pnpm --filter @caplets/core windows-helper:verify-publish

      - name: Run Windows Restart Manager/share-deny gate
        run: pnpm storage:platform:check
        env:
          CAPLETS_STORAGE_PLATFORM_EXPECT: win32
          CAPLETS_STORAGE_RESULT_DIR: storage-results
          CAPLETS_PRIOR_CAPLETS_BIN: caplets.cmd
          CAPLETS_REQUIRE_PRIOR_PACKAGE: "1"

      - name: Pack core with signed helper manifest
        run: pnpm --filter @caplets/core pack --pack-destination storage-results/pack

      - name: Upload Windows exclusion evidence and package
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: storage-exclusion-windows
          path: |
            storage-results/*.json
            storage-results/pack/*.tgz
          if-no-files-found: error

  storage-package-matrix:
    name: Storage package (${{ matrix.id }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: node-22.23.1-linux-glibc-x64
            runner: ubuntu-24.04
            runtime: node
            version: 22.23.1
          - id: node-22.23.1-linux-glibc-arm64
            runner: ubuntu-24.04-arm
            runtime: node
            version: 22.23.1
          - id: node-22.23.1-darwin-x64
            runner: macos-15-intel
            runtime: node
            version: 22.23.1
          - id: node-22.23.1-darwin-arm64
            runner: macos-15
            runtime: node
            version: 22.23.1
          - id: node-22.23.1-win32-x64
            runner: windows-2025
            runtime: node
            version: 22.23.1
          - id: node-24.18.0-linux-glibc-x64
            runner: ubuntu-24.04
            runtime: node
            version: 24.18.0
          - id: node-24.18.0-linux-glibc-arm64
            runner: ubuntu-24.04-arm
            runtime: node
            version: 24.18.0
          - id: node-24.18.0-darwin-x64
            runner: macos-15-intel
            runtime: node
            version: 24.18.0
          - id: node-24.18.0-darwin-arm64
            runner: macos-15
            runtime: node
            version: 24.18.0
          - id: node-24.18.0-win32-x64
            runner: windows-2025
            runtime: node
            version: 24.18.0
          - id: bun-1.3.14-linux-glibc-x64
            runner: ubuntu-24.04
            runtime: bun
            version: 1.3.14
          - id: bun-1.3.14-darwin-arm64
            runner: macos-15
            runtime: bun
            version: 1.3.14
          - id: docker-node-24.18.0-bookworm-x64
            runner: ubuntu-24.04
            runtime: docker
            version: 24.18.0
            image: node:24.18.0-bookworm-slim
          - id: docker-node-24.18.0-bookworm-arm64
            runner: ubuntu-24.04-arm
            runtime: docker
            version: 24.18.0
            image: node:24.18.0-bookworm-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        if: matrix.runtime != 'docker'
        uses: pnpm/action-setup@v6

      - name: Setup Node
        if: matrix.runtime != 'docker'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.runtime == 'node' && matrix.version || '24.18.0' }}
          cache: pnpm

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.version }}

      - name: Install dependencies
        if: matrix.runtime != 'docker'
        run: pnpm install --frozen-lockfile

      - name: Check packed Node or Bun tuple
        if: matrix.runtime != 'docker'
        run: pnpm storage:package:check
        env:
          CAPLETS_STORAGE_TUPLE_ID: ${{ matrix.id }}
          CAPLETS_STORAGE_RUNTIME: ${{ matrix.runtime }}
          CAPLETS_STORAGE_RUNTIME_VERSION: ${{ matrix.version }}
          CAPLETS_PACKAGE_RUNTIME_EXECUTABLE: ${{ matrix.runtime == 'bun' && 'bun' || '' }}
          CAPLETS_STORAGE_RESULT_DIR: storage-results

      - name: Check packed Debian image tuple
        if: matrix.runtime == 'docker'
        shell: bash
        run: >-
          docker run --rm
          --volume "$PWD:/workspace"
          --workdir /workspace
          --env CAPLETS_STORAGE_TUPLE_ID=${{ matrix.id }}
          --env CAPLETS_STORAGE_RESULT_DIR=storage-results
          ${{ matrix.image }}
          sh -lc "corepack enable && corepack prepare pnpm@11.7.0 --activate && pnpm install --frozen-lockfile && pnpm storage:package:check"

      - name: Upload storage package result
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: storage-package-${{ matrix.id }}
          path: storage-results/*.json
          if-no-files-found: error

  changeset:
    name: Changeset
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'no changeset') == false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check changeset
        run: pnpm changeset status --since=origin/main
